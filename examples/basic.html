<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRuns Icon Picker Demo</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Replace this with your own Font Awesome 7 stylesheet -->
    <link rel="stylesheet" href="/path/to/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="../css/myruns-iconpicker.css">

    <style>
        body {
            background: #f4f6f8;
            padding: 32px 0;
        }

        .demo-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 12px 32px rgba(31, 41, 55, 0.08);
            padding: 24px;
        }

        .demo-icon {
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            display: flex;
            font-size: 56px;
            justify-content: center;
            min-height: 160px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="demo-card">
                    <h1 class="h3 mb-3">MyRuns Icon Picker</h1>
                    <p class="text-muted mb-4">Standalone demo for the Font Awesome 7 icon picker.</p>

                    <div class="d-flex gap-2 mb-3">
                        <button id="iconPickerBtn" class="btn btn-primary" type="button">
                            <i class="fa fa-solid fa-house"></i> Choose icon
                        </button>
                        <input id="iconClassOutput" class="form-control" value="fa fa-solid fa-house" readonly>
                    </div>

                    <div class="demo-icon mb-3">
                        <i id="previewIcon" class="fa fa-solid fa-house"></i>
                    </div>

                    <pre class="mb-0"><code>$('#iconPickerBtn').myrunsIconPicker({
    family: 'solid',
    icon: 'house'
}).on('change', function (event) {
    $('#previewIcon').attr('class', event.iconClass);
    $('#iconClassOutput').val(event.iconClass);
});</code></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/myruns-iconpicker.js"></script>
    <script>
        $('#iconPickerBtn').myrunsIconPicker({
            family: 'solid',
            icon: 'house'
        }).on('change', function (event) {
            $('#previewIcon').attr('class', event.iconClass);
            $('#iconClassOutput').val(event.iconClass);
        });
    </script>
</body>
</html>
